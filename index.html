<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NC Lathe CAD</title>
<style>
body{margin:0;background:#111;color:#eee;font-family:Arial,sans-serif;overflow:hidden}
#top{height:42px;background:#222;display:flex;align-items:center;gap:10px;padding:0 10px;font-size:13px}
#cad{display:block;background:#050505;touch-action:none}
#bar{height:92px;background:#1b1b1b;display:flex;flex-wrap:wrap;gap:6px;padding:6px;box-sizing:border-box}
button{background:#333;color:#fff;border:1px solid #666;border-radius:8px;padding:8px 10px;font-weight:bold}
button.on{background:#0a65d8}
#panel{position:absolute;left:12px;right:12px;top:80px;background:#222;border:1px solid #777;border-radius:12px;padding:12px;display:none}
#panel input{width:90%;font-size:18px;margin:6px;padding:8px}
#out{position:absolute;left:8px;right:8px;bottom:105px;height:180px;background:#fff;color:#000;display:none;overflow:auto;font-size:12px;padding:8px;white-space:pre-wrap}
</style>
</head>
<body>
<div id="top">
<b>NC Lathe CAD</b>
<span id="pos">Z0 X0</span>
<span id="mode">AUTO</span>
</div>

<canvas id="cad"></canvas>

<div id="bar">
<button onclick="setMode('AUTO')" id="bAUTO" class="on">AUTO</button>
<button onclick="setMode('H')" id="bH">H-LINE</button>
<button onclick="setMode('V')" id="bV">V-LINE</button>
<button onclick="setMode('DEL')" id="bDEL">DELETE</button>
<button onclick="undo()">UNDO</button>
<button onclick="fit()">FIT</button>
<button onclick="showDXF()">DXF</button>
<button onclick="clearAll()">CLEAR</button>
</div>

<div id="panel">
<div id="ptitle">LINE INPUT</div>
<div id="inputs"></div>
<button onclick="okLine()">OK</button>
<button onclick="cancelLine()">Cancel</button>
</div>

<div id="out"></div>

<script>
let canvas=document.getElementById("cad"),ctx=canvas.getContext("2d");
let elems=[],undoStack=[],mode="AUTO",scale=8,ox=0,oy=0;
let start=null,end=null,pending=null,selected=-1;

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight-134;
  draw();
}
addEventListener("resize",resize);
resize();

function cadToScr(p){
  return {
    x:canvas.width/2+ox+p.z*scale,
    y:canvas.height/2+oy-p.x*scale
  };
}
function scrToCad(x,y){
  return {
    z:(x-canvas.width/2-ox)/scale,
    x:(canvas.height/2+oy-y)/scale
  };
}
function fmt(v){return Math.round(v*1000)/1000}

function setMode(m){
  mode=m;
  document.getElementById("mode").textContent=m;
  ["AUTO","H","V","DEL"].forEach(k=>{
    document.getElementById("b"+k).classList.toggle("on",k==m);
  });
}

function pushUndo(){
  undoStack.push(JSON.stringify(elems));
  if(undoStack.length>50)undoStack.shift();
}

function undo(){
  let s=undoStack.pop();
  if(!s)return;
  elems=JSON.parse(s);
  selected=-1;
  draw();
}

function clearAll(){
  if(!confirm("全削除しますか？"))return;
  pushUndo();
  elems=[];
  selected=-1;
  draw();
}

function fit(){
  if(!elems.length){scale=8;ox=0;oy=0;draw();return}
  let zs=[],xs=[];
  elems.forEach(e=>{zs.push(e.z1,e.z2);xs.push(e.x1,e.x2)});
  let zmin=Math.min(...zs),zmax=Math.max(...zs),xmin=Math.min(...xs),xmax=Math.max(...xs);
  let dz=Math.max(1,zmax-zmin),dx=Math.max(1,xmax-xmin);
  scale=Math.min(canvas.width/(dz+20),canvas.height/(dx+20));
  ox=-((zmin+zmax)/2)*scale;
  oy=((xmin+xmax)/2)*scale;
  draw();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  drawAxes();

  elems.forEach((e,i)=>{
    let a=cadToScr({z:e.z1,x:e.x1}),b=cadToScr({z:e.z2,x:e.x2});
    ctx.strokeStyle=i==selected?"yellow":"#00ff80";
    ctx.lineWidth=i==selected?4:2;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    drawPt(a);drawPt(b);
  });

  if(start&&end){
    let a=cadToScr(start),b=cadToScr(end);
    let d=detect(start,end);
    if(mode=="H"||d=="H")b.y=a.y;
    if(mode=="V"||d=="V")b.x=a.x;
    ctx.strokeStyle="orange";ctx.lineWidth=2;
    ctx.setLineDash([6,5]);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawGrid(){
  let step=10;
  ctx.strokeStyle="rgba(255,255,255,.12)";
  ctx.lineWidth=1;
  for(let z=-1000;z<=1000;z+=step){
    let a=cadToScr({z:z,x:-1000}),b=cadToScr({z:z,x:1000});
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  for(let x=-1000;x<=1000;x+=step){
    let a=cadToScr({z:-1000,x:x}),b=cadToScr({z:1000,x:x});
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
}

function drawAxes(){
  ctx.strokeStyle="#888";ctx.lineWidth=1;
  let a=cadToScr({z:-1000,x:0}),b=cadToScr({z:1000,x:0});
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  a=cadToScr({z:0,x:-1000});b=cadToScr({z:0,x:1000});
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
}

function drawPt(p){
  ctx.fillStyle="#00ccff";
  ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
}

function detect(a,b){
  return Math.abs(b.z-a.z)>=Math.abs(b.x-a.x)?"H":"V";
}

function snap(p){
  let best=p,bd=12/scale;
  elems.forEach(e=>{
    [{z:e.z1,x:e.x1},{z:e.z2,x:e.x2}].forEach(q=>{
      let d=Math.hypot(p.z-q.z,p.x-q.x);
      if(d<bd){bd=d;best=q}
    });
  });
  return best;
}

canvas.addEventListener("pointerdown",e=>{
  let p=snap(scrToCad(e.offsetX,e.offsetY));
  if(mode=="DEL"){
    selected=hit(p);
    if(selected>=0){pushUndo();elems.splice(selected,1);selected=-1;draw()}
    return;
  }
  start=p;end=p;
});

canvas.addEventListener("pointermove",e=>{
  let p=scrToCad(e.offsetX,e.offsetY);
  document.getElementById("pos").textContent="Z"+fmt(p.z)+" X"+fmt(p.x);
  if(start){end=snap(p);draw()}
});

canvas.addEventListener("pointerup",e=>{
  if(!start||!end)return;
  let d=mode=="AUTO"?detect(start,end):mode;
  if(d!="H"&&d!="V"){start=null;end=null;draw();return}
  pending={a:start,b:end,d:d};
  openPanel();
});

function hit(p){
  let best=-1,bd=12/scale;
  elems.forEach((e,i)=>{
    let d=distSeg(p,{z:e.z1,x:e.x1},{z:e.z2,x:e.x2});
    if(d<bd){bd=d;best=i}
  });
  return best;
}

function distSeg(p,a,b){
  let vz=b.z-a.z,vx=b.x-a.x,wz=p.z-a.z,wx=p.x-a.x;
  let l=vz*vz+vx*vx;
  let t=l?Math.max(0,Math.min(1,(wz*vz+wx*vx)/l)):0;
  let q={z:a.z+t*vz,x:a.x+t*vx};
  return Math.hypot(p.z-q.z,p.x-q.x);
}

function openPanel(){
  let p=document.getElementById("panel");
  let ins=document.getElementById("inputs");
  if(pending.d=="H"){
    ins.innerHTML='X<br><input id="ix" value="'+fmt((pending.a.x+pending.b.x)/2)+'"><br>Z1<br><input id="iz1" value="'+fmt(pending.a.z)+'"><br>Z2<br><input id="iz2" value="'+fmt(pending.b.z)+'">';
  }else{
    ins.innerHTML='Z<br><input id="iz" value="'+fmt((pending.a.z+pending.b.z)/2)+'"><br>X1<br><input id="ix1" value="'+fmt(pending.a.x)+'"><br>X2<br><input id="ix2" value="'+fmt(pending.b.x)+'">';
  }
  p.style.display="block";
}

function okLine(){
  pushUndo();
  if(pending.d=="H"){
    let x=Number(ix.value),z1=Number(iz1.value),z2=Number(iz2.value);
    elems.push({type:"LINE",z1:z1,x1:x,z2:z2,x2:x});
  }else{
    let z=Number(iz.value),x1=Number(ix1.value),x2=Number(ix2.value);
    elems.push({type:"LINE",z1:z,x1:x1,z2:z,x2:x2});
  }
  cancelLine();
}

function cancelLine(){
  document.getElementById("panel").style.display="none";
  start=null;end=null;pending=null;
  draw();
}

function showDXF(){
  let o=document.getElementById("out");
  o.style.display=o.style.display=="block"?"none":"block";
  o.textContent=JSON.stringify(elems,null,2);
}

</script>
</body>
</html>
